<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Corp Slug — No One Is Illegal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

#bg-frame {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  border: none; z-index: 0;
  pointer-events: none;
}

#game {
  position: fixed;
  z-index: 2;
  display: block;
  image-rendering: pixelated;
}
</style>
</head>
<body>

<iframe id="bg-frame"
  src="https://vibe-coding-bootcamp-ab5utxov6-mohamedalighs-projects.vercel.app"
  scrolling="no" allowfullscreen>
</iframe>

<canvas id="game"></canvas>

<script>
// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');

const GW = 960, GH = 540;   // internal game resolution (16:9)
canvas.width  = GW;
canvas.height = GH;

function fitCanvas() {
  const scaleX = window.innerWidth  / GW;
  const scaleY = window.innerHeight / GH;
  const scale  = Math.max(scaleX, scaleY);      // cover (fill viewport)
  const cw = Math.round(GW * scale);
  const ch = Math.round(GH * scale);
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.style.left   = Math.round((window.innerWidth  - cw) / 2) + 'px';
  canvas.style.top    = Math.round((window.innerHeight - ch) / 2) + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// ── Constants ─────────────────────────────────────────────────────────────────
const GROUND   = GH - 80;
const GRAVITY  = 0.55;
const WALL_W   = 195;        // width of the "No one is illegal" banner/wall

// ── Audio ─────────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();

function tone(f, type, dur, vol = 0.2, fEnd) {
  try {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type;
    o.frequency.setValueAtTime(f, AC.currentTime);
    if (fEnd) o.frequency.exponentialRampToValueAtTime(fEnd, AC.currentTime + dur);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.start(); o.stop(AC.currentTime + dur);
  } catch (_) {}
}

const SFX = {
  shoot:     () => tone(880, 'square',   0.08, 0.14, 260),
  jump:      () => tone(320, 'sine',     0.14, 0.14, 640),
  explode:   () => { tone(110, 'sawtooth', 0.4, 0.28, 18); tone(55, 'square', 0.28, 0.14, 12); },
  hit:       () => tone(90,  'sawtooth', 0.22, 0.28),
  bannerHit: () => tone(60,  'sawtooth', 0.55, 0.38, 20),
  enemyShot: () => tone(680, 'square',   0.06, 0.07, 200),
  waveClear: () => [523, 659, 784, 1047].forEach((n, i) =>
               setTimeout(() => tone(n, 'sine', 0.32, 0.28), i * 140)),
};

// ── Input ─────────────────────────────────────────────────────────────────────
const keys = {};

window.addEventListener('keydown', e => {
  if (['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))
    e.preventDefault();
  keys[e.code] = true;

  if (gameState === 'start')   { gameState = 'playing'; AC.resume(); return; }
  if (gameState === 'gameover' && e.code === 'KeyR') restartGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

const isShooting = () => keys['KeyZ'] || keys['KeyF'] || keys['ControlLeft'] || keys['ControlRight'];
const isLeft     = () => keys['ArrowLeft']  || keys['KeyA'];
const isRight    = () => keys['ArrowRight'] || keys['KeyD'];
const isJump     = () => keys['ArrowUp']    || keys['KeyW'] || keys['Space'];

// ── Screen shake ──────────────────────────────────────────────────────────────
let shakeMag = 0, shakeDur = 0;
function addShake(mag, dur) {
  shakeMag = Math.max(shakeMag, mag);
  shakeDur = Math.max(shakeDur, dur);
}

// ── Confetti ──────────────────────────────────────────────────────────────────
const CONF_COLS = ['#ff4444','#ff8800','#ffee00','#44ee44','#4488ff',
                   '#ee44ff','#ffffff','#00eeff','#ff0077','#88ff44'];
const confetti = [];
let confettiSpawnTimer = 0;   // counts down: while > 0 we keep spawning

function triggerConfetti() {
  confettiSpawnTimer = 4.2;
  SFX.waveClear();
}

function updateConfetti(dt) {
  // Spawn
  if (confettiSpawnTimer > 0) {
    confettiSpawnTimer -= dt;
    for (let i = 0; i < 7; i++) {
      confetti.push({
        x:    Math.random() * GW,
        y:    -12,
        vx:   (Math.random() - 0.5) * 5,
        vy:   2.5 + Math.random() * 3.5,
        w:    8  + Math.random() * 13,
        h:    4  + Math.random() * 8,
        rot:  Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.2,
        color: CONF_COLS[Math.floor(Math.random() * CONF_COLS.length)],
      });
    }
  }

  // Physics
  for (const c of confetti) {
    c.x   += c.vx + Math.sin(c.rot) * 0.6;
    c.y   += c.vy;
    c.rot += c.rotV;
  }

  // Remove off-screen
  for (let i = confetti.length - 1; i >= 0; i--) {
    if (confetti[i].y > GH + 20) confetti.splice(i, 1);
  }
}

function drawConfetti() {
  for (const c of confetti) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.color;
    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    ctx.restore();
  }
}

// ── Particles (explosions) ────────────────────────────────────────────────────
const particles = [];

function burst(x, y, color, n = 14, spd = 5) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = spd * (0.3 + Math.random());
    particles.push({
      x, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s - 2,
      sz: 3 + Math.random() * 5,
      color,
      life: 1,
      decay: 0.03 + Math.random() * 0.04,
    });
  }
}

// ── Bullets ───────────────────────────────────────────────────────────────────
const bullets = [];

// ── Banner / statement wall ───────────────────────────────────────────────────
let bannerHp, bannerMaxHp, bannerFlash;

function resetBanner() {
  bannerHp = 5; bannerMaxHp = 5; bannerFlash = 0;
}

function hurtBanner() {
  bannerHp--;
  bannerFlash = 0.45;
  addShake(11, 22);
  SFX.bannerHit();
  burst(WALL_W + 30, GROUND - 100, '#ff6600', 22, 8);
  if (bannerHp <= 0) gameState = 'gameover';
}

function drawStar(x, y, pts, r1, r2, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < pts * 2; i++) {
    const r = i % 2 === 0 ? r1 : r2;
    const a = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
    i === 0 ? ctx.moveTo(x + r * Math.cos(a), y + r * Math.sin(a))
            : ctx.lineTo(x + r * Math.cos(a), y + r * Math.sin(a));
  }
  ctx.closePath();
  ctx.fill();
}

function drawBanner() {
  const fl = bannerFlash > 0;

  // Brick wall base
  ctx.fillStyle = fl ? '#7a0000' : '#180900';
  ctx.fillRect(0, 0, WALL_W, GH);

  if (!fl) {
    const bW = 65, bH = 28;
    for (let row = 0; row * bH < GH; row++) {
      const offset = (row % 2) * Math.floor(bW / 2);
      for (let col = -1; col * bW < WALL_W + bW; col++) {
        ctx.fillStyle = (row + col) % 3 === 0 ? '#221000' : '#1e0d00';
        ctx.fillRect(col * bW + offset + 1, row * bH + 1, bW - 2, bH - 2);
      }
    }
  }

  // Painted mural panel
  const panelX = 12, panelY = 44;
  const panelW = WALL_W - 24, panelH = GROUND - 60 - panelY;

  ctx.fillStyle = fl ? '#550000' : 'rgba(0, 40, 10, 0.88)';
  ctx.fillRect(panelX, panelY, panelW, panelH);

  // Painted border
  ctx.strokeStyle = fl ? '#ff4444' : '#2a8a2a';
  ctx.lineWidth = 2;
  ctx.strokeRect(panelX + 3, panelY + 3, panelW - 6, panelH - 6);

  // Stars
  if (!fl) {
    drawStar(WALL_W / 2, panelY + 18, 5, 7, 3, '#ffcc00');
    drawStar(panelX + 12, panelY + 20, 5, 5, 2, '#ffcc0088');
    drawStar(WALL_W - panelX - 12, panelY + 20, 5, 5, 2, '#ffcc0088');
  }

  // ── "NO ONE IS ILLEGAL" text ──────────────────────────────────────────────
  const cx = WALL_W / 2;
  const textY = panelY + 40;
  const lines = [
    { t: 'NO ONE',   sz: 22 },
    { t: 'IS',       sz: 26 },
    { t: 'ILLEGAL',  sz: 20 },
  ];

  ctx.save();
  ctx.textAlign = 'center';

  let yy = textY;
  for (const line of lines) {
    ctx.font = `bold ${line.sz}px Arial, sans-serif`;

    if (!fl) {
      ctx.shadowColor = '#44ff66';
      ctx.shadowBlur  = 10;
    }
    ctx.fillStyle = fl ? '#ffffff' : '#55ff77';
    ctx.fillText(line.t, cx, yy + line.sz);
    yy += line.sz + 10;
  }

  ctx.shadowBlur  = 0;
  ctx.textAlign   = 'left';
  ctx.restore();

  // Raised fist symbol (simple pixel art)
  if (!fl) {
    const fx = cx, fy = yy + 20;
    ctx.fillStyle = '#ffcc00';
    // Fist body
    ctx.fillRect(fx - 10, fy,      20, 18);
    ctx.fillRect(fx - 8,  fy - 8,  16, 10);
    ctx.fillRect(fx - 4,  fy - 14,  8,  8);
    // Thumb
    ctx.fillRect(fx - 14, fy + 2,  6, 10);
    // Wrist
    ctx.fillRect(fx - 8,  fy + 18, 16, 8);
  }

  // HP bar
  const barY = GROUND + 14;
  const barW = WALL_W - 20;
  ctx.fillStyle = '#2a0000';
  ctx.fillRect(10, barY, barW, 16);
  const pct = bannerHp / bannerMaxHp;
  ctx.fillStyle = pct > 0.6 ? '#22cc44' : pct > 0.3 ? '#ff8800' : '#ff2222';
  ctx.fillRect(10, barY, barW * pct, 16);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(10, barY, barW, 16);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DEFEND!', WALL_W / 2, barY + 12);
  ctx.textAlign = 'left';

  // Edge glow
  ctx.fillStyle = fl ? '#ff4444' : '#22cc44';
  ctx.fillRect(WALL_W, 0, 3, GH);
}

// ── Player ────────────────────────────────────────────────────────────────────
let player;

function makePlayer() {
  return {
    x: WALL_W + 55, y: GROUND,
    w: 30, h: 46,
    vx: 0, vy: 0,
    onGround: true,
    facing: 1,
    lives: 3,
    invTimer: 0,
    shootTimer: 0,
    animFrame: 0, animTimer: 0,
    state: 'idle',
  };
}

function updatePlayer(dt) {
  const p = player;

  p.vx = 0;
  if (isLeft())  { p.vx = -220; p.facing = -1; }
  if (isRight()) { p.vx =  220; p.facing =  1; }
  if (!isLeft() && !isRight()) p.facing = 1;  // always face enemies (right)

  if (isJump() && p.onGround) {
    p.vy = -12;
    p.onGround = false;
    SFX.jump();
  }

  p.vy += GRAVITY;
  p.x  += p.vx * dt;
  p.y  += p.vy;

  if (p.y >= GROUND) { p.y = GROUND; p.vy = 0; p.onGround = true; }
  p.x = Math.max(WALL_W + 4, Math.min(GW - p.w, p.x));

  p.shootTimer -= dt;
  if (isShooting() && p.shootTimer <= 0) {
    p.shootTimer = 0.16;
    const bx = p.facing === 1 ? p.x + p.w + 6 : p.x - 10;
    bullets.push({ x: bx, y: p.y - 28, vx: 620 * p.facing, fromPlayer: true });
    SFX.shoot();
  }

  if (p.invTimer > 0) p.invTimer -= dt;

  p.animTimer += dt;
  if (p.animTimer > 0.12) { p.animFrame = (p.animFrame + 1) % 4; p.animTimer = 0; }
  p.state = !p.onGround ? 'jump' : p.vx !== 0 ? 'run' : 'idle';
}

function hurtPlayer() {
  if (player.invTimer > 0) return;
  player.lives--;
  player.invTimer = 1.8;
  addShake(8, 18);
  SFX.hit();
  burst(player.x + player.w / 2, player.y - player.h / 2, '#ff4444', 14, 5);
  if (player.lives <= 0) gameState = 'gameover';
}

function drawPlayer() {
  const p = player;
  if (p.invTimer > 0 && Math.floor(p.invTimer * 10) % 2 === 0) return;

  ctx.save();
  ctx.translate(Math.round(p.x + p.w / 2), Math.round(p.y));
  ctx.scale(p.facing, 1);

  const leg = p.state === 'run' ? Math.sin(p.animFrame * Math.PI / 2) * 5 : 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0, 2, 14, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // Boots
  ctx.fillStyle = '#1a0a00';
  ctx.fillRect(-12,  -8 + leg, 10, 8);
  ctx.fillRect(  2,  -8 - leg, 10, 8);

  // Pants
  ctx.fillStyle = '#2d5f8a';
  ctx.fillRect(-10, -22 + leg * 0.5, 9, 14);
  ctx.fillRect(  1, -22 - leg * 0.5, 9, 14);

  // Belt
  ctx.fillStyle = '#8a6020';
  ctx.fillRect(-12, -24, 24, 4);
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect( -2, -25,  4, 5);

  // Jacket
  ctx.fillStyle = '#2a5a2a';
  ctx.fillRect(-13, -44, 26, 22);
  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(-13, -44,  5, 10);
  ctx.fillRect(  8, -44,  5, 10);

  // Head
  ctx.fillStyle = '#c8845a';
  ctx.fillRect( -8, -56, 16, 14);

  // Bandana
  ctx.fillStyle = '#cc2200';
  ctx.fillRect( -9, -50, 18,  6);

  // Hair
  ctx.fillStyle = '#1a0a00';
  ctx.fillRect( -8, -58, 16,  5);

  // Eye
  ctx.fillStyle = '#fff';
  ctx.fillRect(  2, -53,  5,  4);
  ctx.fillStyle = '#222';
  ctx.fillRect(  4, -53,  2,  4);

  // Arm + gun
  ctx.fillStyle = '#c8845a';
  ctx.fillRect( 10, -42,  7, 10);
  ctx.fillStyle = '#111';
  ctx.fillRect( 14, -41, 22,  5);
  ctx.fillStyle = '#333';
  ctx.fillRect( 33, -40,  8,  3);

  // Muzzle flash
  if (p.shootTimer > 0.10) {
    ctx.fillStyle = '#ffff44';
    ctx.fillRect( 38, -44, 14, 10);
    ctx.fillStyle = '#ff8800';
    ctx.fillRect( 40, -42,  9,  6);
  }

  ctx.restore();
}

// ── Enemies ───────────────────────────────────────────────────────────────────
const ENEMY_T = {
  grunt:  { hp: 2, spd: 60,  shootInt: 3.0, w: 28, h: 44, worth: 100, color: '#2a3a6a', dark: '#0a1a4a' },
  heavy:  { hp: 5, spd: 34,  shootInt: 2.2, w: 34, h: 50, worth: 300, color: '#5a1a1a', dark: '#2a0a0a' },
  sniper: { hp: 1, spd: 26,  shootInt: 1.4, w: 24, h: 44, worth: 200, color: '#1a4a2a', dark: '#0a2a0a' },
};

const enemies = [];

function spawnEnemy(type) {
  const T = ENEMY_T[type];
  enemies.push({
    x: GW + 30 + Math.random() * 100,
    y: GROUND,
    w: T.w, h: T.h,
    vx: -T.spd, type,
    hp: T.hp, maxHp: T.hp,
    shootTimer: T.shootInt * (0.3 + Math.random() * 0.7),
    animFrame: 0, animTimer: 0,
    hitFlash: 0,
    meleeCd: 0,
    dead: false,
    worth: T.worth,
  });
}

function updateEnemies(dt) {
  for (const e of enemies) {
    if (e.dead) continue;

    e.x += e.vx * dt;
    if (e.hitFlash > 0) e.hitFlash -= dt;
    if (e.meleeCd > 0)  e.meleeCd  -= dt;

    e.animTimer += dt;
    if (e.animTimer > 0.15) { e.animFrame = (e.animFrame + 1) % 4; e.animTimer = 0; }

    // Shoot
    const T = ENEMY_T[e.type];
    e.shootTimer -= dt;
    if (e.shootTimer <= 0 && e.x < GW) {
      e.shootTimer = T.shootInt + Math.random() * 0.7;
      bullets.push({ x: e.x, y: e.y - e.h * 0.55, vx: -300, fromPlayer: false });
      SFX.enemyShot();
    }

    // Reached the wall → damage banner
    if (e.x <= WALL_W + 12) {
      e.dead = true;
      hurtBanner();
    }
  }
}

function hurtEnemy(e) {
  e.hp--;
  e.hitFlash = 0.12;
  if (e.hp <= 0) {
    e.dead = true;
    score      += e.worth;
    totalKills += 1;
    addShake(5, 10);
    SFX.explode();
    burst(e.x + e.w / 2, e.y - e.h / 2, '#ff6600', 14, 6);
    burst(e.x + e.w / 2, e.y - e.h / 2, '#ffcc00',  7, 3);
  }
}

function drawEnemy(e) {
  const T  = ENEMY_T[e.type];
  const fl = e.hitFlash > 0;
  ctx.save();
  ctx.translate(Math.round(e.x + e.w / 2), Math.round(e.y));

  const leg = Math.sin(e.animFrame * Math.PI / 2) * 5;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 2, e.w * 0.55, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  const bodyC = fl ? '#fff' : T.color;
  const darkC = fl ? '#ccc' : T.dark;

  // Boots
  ctx.fillStyle = fl ? '#eee' : '#0a0a0a';
  ctx.fillRect(-e.w / 2,       -8 + leg, e.w / 2 - 2, 8);
  ctx.fillRect( 2,             -8 - leg, e.w / 2 - 2, 8);

  // Legs
  ctx.fillStyle = darkC;
  ctx.fillRect(-e.w / 2 + 1,  -22 + leg * 0.5, e.w / 2 - 2, 14);
  ctx.fillRect( 2,             -22 - leg * 0.5, e.w / 2 - 2, 14);

  // Body / armour
  ctx.fillStyle = bodyC;
  ctx.fillRect(-e.w / 2, -e.h + 10, e.w, e.h - 24);

  // Corp logo
  if (!fl) {
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(-7, -e.h + 22, 14, 10);
    ctx.fillStyle = T.color;
    ctx.fillRect(-5, -e.h + 24, 10,  6);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(-1, -e.h + 26,  2,  2);
  }

  // Helmet
  ctx.fillStyle = fl ? '#eee' : '#0a0f1f';
  ctx.fillRect(-e.w / 2 + 1, -e.h + 2, e.w - 2, 12);
  ctx.fillStyle = fl ? '#88f' : '#4499ff';
  ctx.fillRect(-e.w / 2 + 3, -e.h + 5, e.w - 6,  6);

  // Gun (pointing left)
  ctx.fillStyle = fl ? '#eee' : '#111';
  ctx.fillRect(-e.w / 2 - 14, -e.h + 26, 16, 5);
  ctx.fillStyle = '#555';
  ctx.fillRect(-e.w / 2 - 21, -e.h + 27,  9, 3);

  // HP bar (if damaged)
  if (e.hp < e.maxHp) {
    ctx.fillStyle = '#300';
    ctx.fillRect(-e.w / 2, -e.h - 6, e.w, 4);
    ctx.fillStyle = '#0f0';
    ctx.fillRect(-e.w / 2, -e.h - 6, e.w * (e.hp / e.maxHp), 4);
  }

  ctx.restore();
}

// ── Wave system ───────────────────────────────────────────────────────────────
let score, wave, totalKills, gameState;
let spawnTimer, spawnInterval, waveEnemiesLeft;
let wavePhase;   // 'spawning' | 'clearing' | 'pausing'
let wavePause;

function wavePool() {
  if (wave <= 1) return ['grunt'];
  if (wave <= 3) return ['grunt', 'grunt', 'sniper'];
  if (wave <= 5) return ['grunt', 'sniper', 'heavy'];
  return ['sniper', 'heavy', 'heavy'];
}

function startWave() {
  wave++;
  waveEnemiesLeft = 5 + wave * 2;
  spawnInterval   = Math.max(0.7, 2.2 - wave * 0.1);
  spawnTimer      = 0;
  wavePhase       = 'spawning';
}

function trySpawn(dt) {
  if (wavePhase === 'spawning') {
    spawnTimer += dt;
    if (spawnTimer >= spawnInterval && waveEnemiesLeft > 0) {
      spawnTimer = 0;
      waveEnemiesLeft--;
      const pool = wavePool();
      spawnEnemy(pool[Math.floor(Math.random() * pool.length)]);
      if (wave >= 3 && Math.random() < 0.28 && waveEnemiesLeft > 0) {
        waveEnemiesLeft--;
        spawnEnemy(pool[Math.floor(Math.random() * pool.length)]);
      }
      if (waveEnemiesLeft === 0) wavePhase = 'clearing';
    }
  }

  if (wavePhase === 'clearing') {
    const alive = enemies.filter(e => !e.dead).length;
    if (alive === 0) {
      wavePhase  = 'pausing';
      wavePause  = 3.8;
      triggerConfetti();
    }
  }

  if (wavePhase === 'pausing') {
    wavePause -= dt;
    if (wavePause <= 0) startWave();
  }
}

// ── Scene / ground ────────────────────────────────────────────────────────────
function drawScene() {
  // Semi-transparent dark overlay (lets website show through)
  ctx.fillStyle = 'rgba(4, 0, 12, 0.52)';
  ctx.fillRect(0, 0, GW, GH);

  // Ground strip
  const gx = WALL_W + 3;
  const gw = GW - gx;
  ctx.fillStyle = '#1a1218';
  ctx.fillRect(gx, GROUND, gw, GH - GROUND);
  ctx.fillStyle = '#2a2020';
  ctx.fillRect(gx, GROUND, gw, 3);

  // Road markings
  for (let i = 0; i < 16; i++) {
    const rx = gx + ((i * 64 + Math.floor(score / 5)) % gw);
    ctx.fillStyle = '#332828';
    ctx.fillRect(rx, GROUND + 22, 48, 4);
  }
}

// ── HUD ───────────────────────────────────────────────────────────────────────
function drawHUD() {
  const hx = WALL_W + 3;
  const hw  = GW - hx;

  // Top bar
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(hx, 0, hw, 42);

  // Player lives (tiny soldiers)
  for (let i = 0; i < player.lives; i++) {
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(hx + 12 + i * 24, 10, 10, 14);
    ctx.fillStyle = '#c8845a';
    ctx.fillRect(hx + 13 + i * 24,  6,  8,  6);
  }

  // Score
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('SCORE  ' + String(score).padStart(7, '0'), hx + hw / 2, 27);
  ctx.textAlign = 'left';

  // Wave / kills
  ctx.fillStyle = '#44ccff';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('WAVE ' + wave, GW - 12, 17);
  ctx.fillStyle = '#ff9900';
  ctx.fillText('KILLS: ' + totalKills, GW - 12, 33);
  ctx.textAlign = 'left';

  // Wave status message
  if (wavePhase === 'pausing' && wavePause > 0) {
    const msg = confettiSpawnTimer > 0 ? '✦ WAVE CLEARED! ✦' : 'PREPARE...';
    ctx.fillStyle = confettiSpawnTimer > 0 ? '#44ff66' : '#ffcc00';
    ctx.font = 'bold 26px monospace';
    ctx.textAlign = 'center';
    // glow
    ctx.shadowColor = confettiSpawnTimer > 0 ? '#44ff66' : '#ff8800';
    ctx.shadowBlur  = 14;
    ctx.fillText(msg, hx + hw / 2, GH / 2);
    ctx.shadowBlur  = 0;
    ctx.textAlign   = 'left';
  }
}

// ── Start / Game-over overlays ────────────────────────────────────────────────
function drawStartScreen() {
  const hx = WALL_W + 3;
  const hw  = GW - hx;
  const cx  = hx + hw / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(hx, 0, hw, GH);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 52px monospace';
  ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 18;
  ctx.fillText('CORP SLUG', cx, GH / 2 - 100);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#44ff66';
  ctx.font = 'bold 18px monospace';
  ctx.fillText('DEFEND THE STATEMENT', cx, GH / 2 - 58);

  ctx.fillStyle = '#888';
  ctx.font = '14px monospace';
  ['← → / A D  —  Move',
   '↑ / W / SPACE  —  Jump',
   'Z / F / CTRL  —  Shoot',
  ].forEach((l, i) => ctx.fillText(l, cx, GH / 2 - 10 + i * 22));

  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 17px monospace';
    ctx.fillText('▶  PRESS ANY KEY TO START  ◀', cx, GH / 2 + 90);
  }

  ctx.textAlign = 'left';
}

function drawGameOver() {
  const hx = WALL_W + 3;
  const hw  = GW - hx;
  const cx  = hx + hw / 2;

  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(hx, 0, hw, GH);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ff2222';
  ctx.font = 'bold 54px monospace';
  ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 20;
  ctx.fillText('GAME OVER', cx, GH / 2 - 70);
  ctx.shadowBlur = 0;

  const reason = bannerHp <= 0
    ? 'THE STATEMENT WAS ERASED'
    : 'YOU FELL IN BATTLE';
  ctx.fillStyle = '#ff8800';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(reason, cx, GH / 2 - 28);

  ctx.fillStyle = '#ffcc00';
  ctx.font = '20px monospace';
  ctx.fillText('SCORE  ' + String(score).padStart(7, '0'), cx, GH / 2 + 18);
  ctx.fillText('WAVE REACHED: ' + wave, cx, GH / 2 + 44);

  ctx.fillStyle = '#888';
  ctx.font = '16px monospace';
  ctx.fillText('Press  R  to try again', cx, GH / 2 + 88);

  ctx.textAlign = 'left';
}

// ── Collision helper ──────────────────────────────────────────────────────────
function rectHit(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ── Init ──────────────────────────────────────────────────────────────────────
function restartGame() {
  score = 0; wave = 0; totalKills = 0;
  enemies.length   = 0;
  bullets.length   = 0;
  particles.length = 0;
  confetti.length  = 0;
  confettiSpawnTimer = 0;
  spawnTimer = 0;
  shakeMag = 0; shakeDur = 0;
  player = makePlayer();
  resetBanner();
  startWave();
  gameState = 'playing';
}

// Bootstrap state
gameState  = 'start';
score = 0; wave = 0; totalKills = 0;
player = makePlayer();
resetBanner();
wavePhase = 'pausing'; wavePause = 0;  // will call startWave immediately

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastT = 0;

function loop(t) {
  const dt = Math.min((t - lastT) / 1000, 0.05);
  lastT = t;

  if (gameState === 'playing') {
    updatePlayer(dt);
    updateEnemies(dt);
    trySpawn(dt);
    updateConfetti(dt);

    for (const b of bullets) b.x += b.vx * dt;

    // Player bullets vs enemies
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      if (!b.fromPlayer) continue;
      let hit = false;
      for (const e of enemies) {
        if (e.dead) continue;
        if (b.x > e.x - 2 && b.x < e.x + e.w + 2 &&
            b.y > e.y - e.h - 2 && b.y < e.y + 2) {
          hurtEnemy(e); hit = true; break;
        }
      }
      if (hit) bullets.splice(bi, 1);
    }

    // Enemy bullets vs player
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      if (b.fromPlayer) continue;
      if (rectHit(b.x - 4, b.y - 4, 8, 8,
                  player.x + 5, player.y - player.h + 6,
                  player.w - 10, player.h - 10)) {
        hurtPlayer(); bullets.splice(bi, 1);
      }
    }

    // Enemy melee vs player (with per-contact cooldown)
    for (const e of enemies) {
      if (e.dead || e.meleeCd > 0) continue;
      if (rectHit(player.x + 5, player.y - player.h + 6, player.w - 10, player.h - 10,
                  e.x + 3, e.y - e.h + 6, e.w - 6, e.h - 10)) {
        hurtPlayer();
        e.meleeCd = 1.2;  // 1.2 s cooldown so each enemy can only melee once per second
      }
    }

    // Particles physics
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.22; p.life -= p.decay;
    }

    // Banner flash decay
    if (bannerFlash > 0) bannerFlash -= dt;

    // Screen shake decay
    if (shakeDur > 0) shakeDur--;
    else shakeMag = 0;

    // Cleanup
    for (let i = bullets.length   - 1; i >= 0; i--)
      if (bullets[i].x < WALL_W || bullets[i].x > GW + 50) bullets.splice(i, 1);
    for (let i = enemies.length   - 1; i >= 0; i--) if (enemies[i].dead)    enemies.splice(i, 1);
    for (let i = particles.length - 1; i >= 0; i--) if (particles[i].life <= 0) particles.splice(i, 1);
  }

  // ── Render ───────────────────────────────────────────────────────────────
  ctx.clearRect(0, 0, GW, GH);       // fully transparent → website shows through

  drawScene();                         // semi-transparent overlay + ground
  drawBanner();                        // solid left wall

  const sx = shakeDur > 0 ? (Math.random() - 0.5) * shakeMag : 0;
  const sy = shakeDur > 0 ? (Math.random() - 0.5) * shakeMag : 0;
  ctx.save();
  ctx.translate(sx, sy);

  // Bullets
  for (const b of bullets) {
    if (b.fromPlayer) {
      ctx.fillStyle = '#ffff44';
      ctx.fillRect(b.x - 8, b.y - 2, 16, 4);
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(b.x - 5, b.y - 1, 10, 2);
    } else {
      ctx.fillStyle = '#4488ff';
      ctx.fillRect(b.x - 6, b.y - 3, 12, 6);
      ctx.fillStyle = '#aaccff';
      ctx.fillRect(b.x - 4, b.y - 1,  8, 2);
    }
  }

  for (const e of enemies) if (!e.dead) drawEnemy(e);

  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz);
  }
  ctx.globalAlpha = 1;

  drawPlayer();
  ctx.restore();

  drawConfetti();   // on top of everything (full screen)
  drawHUD();

  if (gameState === 'start')    drawStartScreen();
  if (gameState === 'gameover') drawGameOver();

  requestAnimationFrame(loop);
}

requestAnimationFrame(t => { lastT = t; requestAnimationFrame(loop); });
</script>
</body>
